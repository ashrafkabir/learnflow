components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRequestId:
      description: Request identifier for tracing
      schema:
        type: string

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        displayName: { type: string }
        role: { type: string }
        tier: { type: string }
        onboardingCompletedAt:
          type: string
          nullable: true
          description: ISO timestamp when onboarding completed

    ErrorEnvelope:
      type: object
      required: [error, requestId]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
        requestId:
          type: string
        status:
          type: integer

    Source:
      type: object
      properties:
        title: { type: string }
        url: { type: string }
        author: { type: string }
