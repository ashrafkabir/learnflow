openapi: 3.0.3
info:
  title: LearnFlow API
  version: 1.0.0
  description: AI-powered learning platform API
servers:
  - url: http://localhost:3000
paths:
  /api/v1/auth/register:
    post:
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                displayName: { type: string }
      responses:
        '201':
          {
            description: Account created,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        properties:
                          { token: { type: string }, user: { $ref: '#/components/schemas/User' } },
                      },
                  },
              },
          }
  /api/v1/auth/login:
    post:
      summary: Authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: JWT returned }
        '401': { description: Invalid credentials }
  /api/v1/keys:
    post:
      summary: Add API key
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Key stored }
    get:
      summary: List API keys
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Key list }
  /api/v1/chat:
    post:
      summary: Send message to Orchestrator
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                attachments: { type: array, items: { type: string } }
      responses:
        '200': { description: Orchestrator response }
  /api/v1/courses:
    get:
      summary: List enrolled courses
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Course list }
    post:
      summary: Create course
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Course created }
  /api/v1/courses/{id}:
    get:
      summary: Get course detail
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Course detail }
        '404': { description: Not found }
  /api/v1/courses/{id}/lessons/{lessonId}:
    get:
      summary: Get lesson content
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Lesson content }
  /api/v1/courses/{id}/lessons/{lessonId}/complete:
    post:
      summary: Mark lesson complete
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Lesson marked complete }
  /api/v1/mindmap:
    get:
      summary: Get knowledge graph
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Mindmap data }
  /api/v1/marketplace/courses:
    get:
      summary: Browse course marketplace
      security: [{ bearerAuth: [] }]
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: topic
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: maxPrice
          in: query
          schema: { type: number }
      responses:
        '200': { description: Marketplace courses }
  /api/v1/marketplace/agents:
    get:
      summary: Browse agent marketplace
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Agent list }
  /api/v1/marketplace/agents/{id}/activate:
    post:
      summary: Activate marketplace agent
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Agent activated }
  /api/v1/profile/context:
    get:
      summary: Get Student Context Object
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Student context }
  /api/v1/subscription:
    post:
      summary: Subscribe/upgrade/downgrade
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [subscribe, upgrade, downgrade, cancel] }
                plan: { type: string, enum: [free, pro] }
      responses:
        '200': { description: Subscription updated }
  /api/v1/analytics:
    get:
      summary: Get learning analytics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Analytics data }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        displayName: { type: string }
        role: { type: string }
        tier: { type: string }
    Error:
      type: object
      required: [error, message, code]
      properties:
        error: { type: string }
        message: { type: string }
        code: { type: integer }
