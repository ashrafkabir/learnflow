openapi: 3.0.3
info:
  title: LearnFlow API
  version: 1.0.0
  description: AI-powered learning platform API
servers:
  - url: http://localhost:3000

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/auth/register:
    post:
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                displayName: { type: string }
      responses:
        '201':
          description: Account created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                required: [user, accessToken, refreshToken]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '409':
          description: Email already registered
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/login:
    post:
      summary: Authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: JWT returned
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                required: [user, accessToken, refreshToken]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          description: Invalid credentials
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New tokens
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                required: [accessToken, refreshToken]
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
        '400':
          description: Missing token
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid/expired token
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/google/callback:
    get:
      summary: Google OAuth callback (mock)
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: JWT returned
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                required: [user, accessToken, refreshToken]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '400':
          description: Missing OAuth code
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/keys:
    post:
      summary: Add API key
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, apiKey]
              properties:
                provider:
                  type: string
                  example: openai
                apiKey:
                  type: string
                label:
                  type: string
      responses:
        '201':
          description: Key stored
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '400':
          description: Validation error
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List API keys
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Key list
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/keys/validate:
    post:
      summary: Validate API key format
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, apiKey]
              properties:
                provider:
                  type: string
                apiKey:
                  type: string
      responses:
        '200':
          description: Valid
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '400':
          description: Invalid key format
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/keys/{provider}:
    delete:
      summary: Delete provider key
      security: [{ bearerAuth: [] }]
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '404':
          description: Not found
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/chat:
    post:
      summary: Send message to Orchestrator
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                courseId: { type: string }
                lessonId: { type: string }
                apiKey: { type: string, description: Optional per-request API key override }
      responses:
        '200':
          description: Orchestrator response
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id: { type: string }
                  agentName: { type: string }
                  content: { type: string }
                  response: { type: string }
                  reply: { type: string }
                  actions:
                    type: array
                    items: { type: string }
                  sources:
                    type: array
                    items:
                      $ref: '#/components/schemas/Source'
                  notes:
                    type: object
                    nullable: true
                    additionalProperties: true
                  questions:
                    type: array
                    nullable: true
                    items: {}
        '400':
          description: Validation error
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/courses:
    get:
      summary: List courses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Course list
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
    post:
      summary: Create/generate course
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic]
              properties:
                topic: { type: string }
                title: { type: string }
                description: { type: string }
                depth: { type: string }
                max_lessons: { type: number }
      responses:
        '201':
          description: Course created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '402':
          description: Payment required (free tier limit)
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/courses/{id}:
    get:
      summary: Get course detail
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Course detail
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '404':
          description: Not found
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete course
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '404':
          description: Not found
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/courses/{id}/lessons/{lessonId}:
    get:
      summary: Get lesson content
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lesson content
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '404':
          description: Not found
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/courses/{id}/add-topic:
    post:
      summary: Add topic to an existing course
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic]
              properties:
                topic: { type: string }
                parentLessonId:
                  { type: string, description: Optional (ignored server-side for now) }
      responses:
        '201':
          description: Added
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '404':
          description: Not found
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/courses/{id}/lessons/{lessonId}/complete:
    post:
      summary: Mark lesson complete
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lesson marked complete
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/notes:
    get:
      summary: Get notes
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Notes
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
    post:
      summary: Create notes
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
    put:
      summary: Update notes
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/notes/illustrate:
    post:
      summary: Generate an illustration for notes
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Illustration
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/illustrations:
    get:
      summary: List illustrations
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Illustrations
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
    post:
      summary: Create illustration
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/illustrations/{illId}:
    delete:
      summary: Delete illustration
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
        - name: illId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/compare:
    post:
      summary: Compare lesson concepts
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Comparison
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/selection-tools/preview:
    post:
      summary: Selection tools preview (discover/illustrate/mark)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tool, selectedText]
              properties:
                tool:
                  type: string
                  enum: [discover, illustrate, mark]
                selectedText:
                  type: string
                apiKey:
                  type: string
      responses:
        '200':
          description: Preview
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '400':
          description: Validation error
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/courses/{id}/lessons/{lessonId}/notes/mark-takeaways:
    post:
      summary: Append key takeaways to notes
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/annotations:
    get:
      summary: List annotations
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Annotations
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
    post:
      summary: Create annotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/courses/{id}/lessons/{lessonId}/annotations/{annId}:
    delete:
      summary: Delete annotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: string }
        - name: annId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/mindmap:
    get:
      summary: Get knowledge graph
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Mindmap data
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/mindmap/suggest:
    post:
      summary: Compute suggested expansion nodes for a course
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId: { type: string }
      responses:
        '200':
          description: Suggestions saved
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/mindmap/suggestions:
    get:
      summary: Get persisted suggestions
      security: [{ bearerAuth: [] }]
      parameters:
        - name: courseId
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Suggestions
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/mindmap/accept:
    post:
      summary: Accept a suggestion
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId, suggestionId]
              properties:
                courseId: { type: string }
                suggestionId: { type: string }
      responses:
        '200':
          description: Updated
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/marketplace/courses:
    get:
      summary: Browse course marketplace
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: topic
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: maxPrice
          in: query
          schema: { type: number }
      responses:
        '200':
          description: Marketplace courses
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/marketplace/courses/{id}:
    get:
      summary: Marketplace course detail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Course
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
        '404':
          description: Not found
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/marketplace/publish:
    post:
      summary: Publish a course
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [title, topic, description, difficulty, price, lessonCount, attributionCount]
              properties:
                title: { type: string }
                topic: { type: string }
                description: { type: string }
                difficulty: { type: string }
                price: { type: number }
                lessonCount: { type: number }
                attributionCount: { type: number }
                readabilityScore: { type: number }
      responses:
        '201':
          description: Published
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/marketplace/courses/{id}/reviews:
    post:
      summary: Create a course review
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                text: { type: string }
      responses:
        '201':
          description: Created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/marketplace/checkout:
    post:
      summary: Start checkout (mock)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId: { type: string }
      responses:
        '200':
          description: Created
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/marketplace/checkout/confirm:
    post:
      summary: Confirm checkout (mock)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentIntentId]
              properties:
                paymentIntentId: { type: string }
      responses:
        '200':
          description: Confirmed
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

  /api/v1/marketplace/agents:
    get:
      summary: Browse agent marketplace
      responses:
        '200':
          description: Agent list
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'

