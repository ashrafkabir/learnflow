<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnFlow — Learn anything. Master everything. Powered by AI agents.</title>
    <meta
      name="description"
      content="AI-powered personalized learning platform. Generate courses from any topic, take smart notes, adaptive quizzes, and visualize your knowledge with mindmaps."
    />
    <meta
      name="keywords"
      content="AI learning, personalized courses, adaptive quizzes, knowledge mindmap, AI tutor, online education"
    />
    <meta name="author" content="LearnFlow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://learnflow.ai/" />
    <meta property="og:title" content="LearnFlow — Learn anything. Master everything." />
    <meta
      property="og:description"
      content="AI-powered personalized learning platform with multi-agent course generation, smart notes, and adaptive quizzes."
    />
    <meta property="og:image" content="https://learnflow.ai/og-image.png" />
    <meta property="og:site_name" content="LearnFlow" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://learnflow.ai/" />
    <meta name="twitter:title" content="LearnFlow — Learn anything. Master everything." />
    <meta
      name="twitter:description"
      content="AI-powered personalized learning platform with multi-agent course generation, smart notes, and adaptive quizzes."
    />
    <meta name="twitter:image" content="https://learnflow.ai/og-image.png" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://learnflow.ai/" />
    <meta name="theme-color" content="#2563EB" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LearnFlow",
        "description": "AI-powered personalized learning platform with multi-agent course generation, smart notes, and adaptive quizzes.",
        "url": "https://learnflow.ai",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web, iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <script>
      // Prevent flash of wrong theme on load
      (function () {
        var t = localStorage.getItem('learnflow-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
