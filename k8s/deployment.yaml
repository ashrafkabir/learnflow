apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnflow-api
  labels:
    app: learnflow
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: learnflow
      component: api
  template:
    metadata:
      labels:
        app: learnflow
        component: api
    spec:
      containers:
        - name: api
          image: learnflow/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: learnflow-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: learnflow-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: learnflow-secrets
                  key: jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: learnflow-secrets
                  key: encryption-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: learnflow-api
spec:
  selector:
    app: learnflow
    component: api
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: learnflow-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.learnflow.ai
      secretName: learnflow-tls
  rules:
    - host: api.learnflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: learnflow-api
                port:
                  number: 80
